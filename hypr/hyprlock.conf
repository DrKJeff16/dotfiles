general {
    disable_loading_bar = false
    hide_cursor = true
    fractional_scaling = 2
    screencopy_mode = 0
    grace = 1
    no_fade_in = false
    no_fade_out = false
    ignore_empty_input = false
    immediate_render = true
    text_trim = true
}

animations {
    enablet = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = /home/drjeff16/Pictures/Radiohead/KidA.jpg
    color = rgba(25, 20, 20, 0.0)

    # all these options are taken from hyprland, see https://wiki.hyprland.org/Configuring/Variables/#blur for explanations
    blur_passes = 3 # 0 disables blurring
    blur_size = 7
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

shape {
    monitor =
    size = 30%, 5%
    color = rgba(22, 57, 81, 0.35)
    rounding = -1
    border_size = 0
    border_color = rgba(200, 207, 230, 1.0)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -20
    halign = center
    valign = center
}
input-field {
    monitor =
    size = 30%, 5%
    outline_thickness = -1
    dots_size = 0.33 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.18 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    dots_rounding = -2 # -1 default circle, -2 follow input-field rounding
    inner_color = rgba(4, 36, 28, 0.0) # no fill
    font_color = rgba(163, 73, 143, 1.0)
    fade_on_empty = true
    fade_timeout = 5000 # Milliseconds before fade_on_empty is triggered.
    placeholder_text = <i>Input Password...</i> # Text rendered in the input box when it's empty.
    hide_input = false
    rounding = -1 # -1 means complete rounding (circle/oval)
    outer_color = rgba(33ccffee) rgba(00ff99ee) 45deg
    check_color=rgba(00ff99ee) rgba(ff6633ee) 120deg
    fail_color=rgba(ff6633ee) rgba(ff0066ee) 40deg
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i> # can be set to empty
    fail_transition = 1500 # transition time in ms between normal outer_color and fail_color
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1 # when both locks are active. -1 means don't change outer color (same for above)
    invert_numlock = true # change color if numlock is off
    swap_font_color = false # see below

    position = 0, -20
    halign = center
    valign = center
}

shape {
    monitor =
    size = 10%, 3%
    rounding = 0
    color = rgba(62, 79, 91, 1.0)

    position = 0, 0
    halign = center
    valign = top
}
label {
    monitor =
    text = cmd[update:1000] echo "<span foreground='##ecd99d'>$(date +%H:%M:%S)</span>"
    text_align = center
    color = rgba(240, 240, 190, 1.0)
    font_size = 21
    font_family = FiraCode Nerd Font Mono
    rotate = 0

    position = 0, 0
    halign = center
    valign = top
}

image {
    monitor =
    path = /home/drjeff16/Pictures/PFPs/00PinkPanther.jpg
    size = 250, 250 # lesser side if not 1:1 ratio
    rounding = -1 # negative values mean circle
    border_size = 1
    border_color = rgb(221, 221, 221)
    rotate = 0 # degrees, counter-clockwise
    reload_time = -1 # seconds between reloading, 0 to reload with SIGUSR2
    reload_cmd =  # command to get new path. if empty, old path will be used. don't run "follow" commands like tail -F

    position = 0, -200
    halign = center
    valign = top
}
shape {
    monitor =
    size = 25%, 6%
    color = rgba(57, 7, 81, 0.45)
    rounding = -1
    border_size = 0
    border_color = rgba(200, 207, 230, 1.0)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 0, -380
    halign = center
    valign = top
}
label {
    monitor =
    text = <b><u>Welcome Back, $USER</u></b>
    text_align = center # center/right or any value for default left. multi-line text alignment inside label container
    color = rgba(190, 230, 240, 1.0)
    font_size = 22
    font_family = FiraCode Nerd Font Mono
    rotate = 0 # degrees, counter-clockwise

    position = 0, -395
    halign = center
    valign = top
}

shape {
    monitor =
    size = 8%, 3%
    color = rgba(3, 79, 76, 0.74)
    rounding = 0
    border_size = 0
    border_color = rgba(210, 217, 170, 1.0)
    rotate = 0
    xray = false # if true, make a "hole" in the background (rectangle of specified size, no rotation)

    position = 170, 0
    halign = center
    valign = top
}
label {
    monitor =
    text = $LAYOUT
    text_align = center
    font_size = 14
    rotate = 0

    position = 170, 0
    halign = center
    valign = top
}
